<script>
const CLIENT_ID='757607436733-5cv7pbhmdo11ojl3310n62jejfloul4o.apps.googleusercontent.com'
const CAL_ID='mickael.darmon.consulting@gmail.com'
const EMAILS=['mehdbou@yahoo.fr','flomathoret@gmail.com']
const LEGAL="L'evaluation du score HSCM est realisee par intelligence artificielle sur la base du protocole HSCM. Cette analyse est indicative et ne constitue pas un diagnostic medical. Elle est soumise a la validation du Dr Boudjemaa et de Mme Mathotret."

function scoreColor(s){if(s>=3)return'#ef4444';if(s===2)return'#f97316';if(s===1)return'#facc15';if(s===0)return'#22c55e';if(s>=-2)return'#60a5fa';return'#3730a3'}
function scoreLabel(s){return({4:'Manie severe',3:'Manie',2:'Hypomanie +2',1:'Hypomanie +1',0:'Normal','-1':'Dep. legere','-2':'Dep. legere-mod.','-3':'Dep. moderee','-4':'Dep. severe'}[String(s)])||'—'}
function calColor(s){if(s>=3)return'11';if(s===2)return'6';if(s===1)return'5';if(s===0)return'10';if(s>=-2)return'9';return'1'}
function fmtMins(m){if(!m||m<=0)return null;var h=Math.floor(m/60),mn=Math.round(m%60);return h+'h'+(mn>0?String(mn).padStart(2,'0'):'')}
function fmtTime(d){if(!d)return'—';return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
function diffMins(a,b){if(!a||!b)return 0;var d=(b-a)/60000;if(d<0)d+=1440;return Math.max(0,d)}
function parseTime(str){
  if(!str||!str.includes(':'))return null;
  var p=str.split(':'),h=parseInt(p[0]),m=parseInt(p[1]);
  if(isNaN(h)||isNaN(m))return null;
  var d=new Date();d.setHours(h,m,0,0);return d;
}
function toTimeInput(d){
  if(!d)return'';
  var h=d.getHours(),m=d.getMinutes();
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

// ── ANALYSE LOCALE ───────────────────────────────────────────────
function analyzeLocal(comment, sleepMins, med, medSOS, momentsAvg, momentsList){
  try{
    function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\u2019\u2018']/g,' ')}
    var txt=norm(comment)
    function has(words){return words.some(function(w){return txt.indexOf(norm(w))>=0})}
    function count(words){return words.filter(function(w){return txt.indexOf(norm(w))>=0}).length}

    var neg4=['suicide','mourir','plus envie de rien','desespoir','paralyse','effondr','plus capable','neant']
    var neg3=['tres mal','horrible','deprime','pleure tout','sans energie','tres melancolique','tres grosse tristesse','abattu','prostration']
    var neg2=['triste','melancolique','fatigue','anxieux','cafard','sombre','pas motive','epuise','tristesse','lourd','pas envie de sortir','epuisement','impression de vie a l interieur']
    var neg1=['pas top','bof','morose','un peu','neutre','leger']
    var pos3=['manie','euphorique','exalte','grandiose','invincible','genie','pas besoin de dormir']
    var pos2=['tres bien','super bien','plein d energie','debordant','creatif','idees qui fusent','accelere','hypomanie']
    var pos1=['bonne humeur','motive','actif','optimiste','energique']

    var negScore=0,posScore=0,signals=[]
    if(has(neg4)){negScore=-4;signals.push('Signaux severes')}
    else if(has(neg3)){negScore=-3;signals.push('Depression moderee-severe')}
    else if(count(neg2)>=2){negScore=-2;signals.push('Depression legere-moderee')}
    else if(has(neg2)){negScore=-1;signals.push('Humeur basse')}
    else if(has(neg1)){negScore=-1;signals.push('Humeur legerement basse')}

    if(has(pos3)){posScore=3;signals.push('Signes maniaques')}
    else if(has(pos2)){posScore=2;signals.push('Hypomanie marquee')}
    else if(count(pos1)>=2){posScore=1;signals.push('Legere hypomanie')}

    var commentScore=negScore!==0?negScore:posScore
    var score

    // Base = moyenne des emojis horaires si disponible
    if(momentsAvg!==null&&momentsAvg!==undefined){
      score=momentsAvg
      signals.unshift('Moyenne de '+momentsList.length+' moment'+(momentsList.length>1?'s':'')+' : '+(momentsAvg>0?'+':'')+momentsAvg)
      // Le commentaire peut moduler d'un cran si plus severe que la moyenne
      if(commentScore<0&&commentScore<score){score=Math.round((score+commentScore)/2);signals.push('Ajuste par commentaire (plus bas)')}
      else if(commentScore>0&&commentScore>score){score=Math.round((score+commentScore)/2);signals.push('Ajuste par commentaire (plus haut)')}
    } else {
      score=commentScore
    }

    if(sleepMins>0&&sleepMins<240&&score>=0){score=Math.min(score+1,4);signals.push('Sommeil tres court')}
    if(sleepMins>600&&score<=0){score=Math.max(score-1,-4);signals.push('Hypersomnie')}
    if(med===false)signals.push('Medication omise')
    if(medSOS)signals.push('SOS: '+medSOS)

    var just=signals.length
      ?'Elements retenus : '+signals.join(', ')+'. Analyse selon protocole HSCM.'
      :'Aucun signal clinique dominant. Score 0 (normal) par defaut.'

    // Alerte si pic extreme dans la journee meme si moyenne lisse
    var extremeAlert=''
    if(momentsList&&momentsList.length){
      var ext=momentsList.reduce(function(a,m){return Math.abs(m.val)>Math.abs(a.val)?m:a},momentsList[0])
      if((ext.val<=-3||ext.val>=3)&&ext.val!==score){
        extremeAlert=' Pic signale a '+ext.heure+' ('+ext.emoji+' '+(ext.val>0?'+':'')+ext.val+') a surveiller malgre la moyenne.'
      }
    }

    var alerte=score<=-3
      ?'ALERTE : Score critique. Contacter Dr Boudjemaa ou Mme Mathotret.'
      :score>=3?'ALERTE : Episode maniaque possible. Surveillance rapprochee.':''
    if(extremeAlert&&!alerte)alerte='ATTENTION :'+extremeAlert

    return{score:score,justification:just+extremeAlert,alerte:alerte}
  }catch(e){return{score:0,justification:'Erreur analyse: '+e.message,alerte:''}}
}

// ── STATE ────────────────────────────────────────────────────────
var token=null,authReady=false
var cycles=[{bed:null,sleep:null,wake:null}]
var med=null,medSOS=null,comment='',weight='',listening=false
var analysis=null,score=null,chartData=[],saveStatus=''
var step='login',editMode=false,editEventId=null,editDate=null
// Nouvelles fonctions : sieste, fatigue, alimentation, hydratation
var sieste={debut:null,fin:null}
var fatigue={phys:null,ment:null,emot:null,impact:''}
var repas={matin:'',midi:'',soir:'',collation:''}
var calories='',macros=''
var eau=0
// Humeurs horaires (emojis) : moyenne = score du jour
var moments=[] // {heure:'HH:MM', emoji:'🙂', val:0}
var EMOJIS=[{e:'😖',v:-4,n:'Tres bas'},{e:'😔',v:-2,n:'Bas'},{e:'😕',v:-1,n:'Un peu bas'},{e:'🙂',v:0,n:'Normal'},{e:'😄',v:2,n:'Bien / eleve'},{e:'🤩',v:4,n:'Tres haut'}]
var newMomentEmoji=null
var FATLBL={phys:['Aucune','Legere','Moderee','Importante','Severe','Epuisement total'],ment:['Aucune','Legere','Moderee','Importante','Severe','Brouillard mental'],emot:['Aucune','Legere','Moderee','Importante','Severe','Vide emotionnel']}
var EAU_OBJ=8

var authTimer=setInterval(function(){
  if(window.google&&window.google.accounts&&window.google.accounts.oauth2){
    authReady=true;clearInterval(authTimer);render()
  }
},300)
setTimeout(function(){if(!authReady){authReady=false;render()}},6000)

function signIn(){
  if(!authReady)return
  window.google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/gmail.compose',
    callback:function(r){if(r.access_token){token=r.access_token;step='form';loadChart();render()}}

function signOut(){if(token&&window.google)window.google.accounts.oauth2.revoke(token,function(){});token=null;step='login';render()}

// ── SLEEP ────────────────────────────────────────────────────────
function getSleep(){
  var done=cycles.filter(function(c){return c.sleep&&c.wake})
  var totalMins=done.reduce(function(a,c){return a+diffMins(c.sleep,c.wake)},0)
  var firstBed=cycles[0]?cycles[0].bed:null
  var allWakes=cycles.filter(function(c){return c.wake})
  var lastWake=allWakes.length?allWakes[allWakes.length-1].wake:null
  return{
    bedtime:fmtTime(firstBed),wakeup:fmtTime(lastWake),
    totalSleep:fmtMins(totalMins),
    totalBed:fmtMins(firstBed&&lastWake?diffMins(firstBed,lastWake):0),
    cycleCount:done.length,totalMins:totalMins,
    cycles:done.map(function(c,i){return{label:'Cycle '+(i+1),s:fmtTime(c.sleep),w:fmtTime(c.wake),d:fmtMins(diffMins(c.sleep,c.wake))}})
  }
}
function setManualTime(idx,field,val){
  var d=parseTime(val);if(!d)return;cycles[idx][field]=d;render()
}
function addCycle(){cycles.push({bed:null,sleep:null,wake:null});render()}
function removeCycle(){if(cycles.length>1){cycles.pop();render()}}
function resetSleep(){cycles=[{bed:null,sleep:null,wake:null}];render()}

// ── SIESTE / FATIGUE / ALIMENTATION / EAU ────────────────────────
function setSieste(field,val){var d=parseTime(val);sieste[field]=d;render()}
function siesteDuree(){if(!sieste.debut||!sieste.fin)return null;return fmtMins(diffMins(sieste.debut,sieste.fin))}
function setFatigue(dim,v){fatigue[dim]=fatigue[dim]===v?null:v;render()}
function setEau(n){eau=eau===n?n-1:n;render()}
function resetSieste(){sieste={debut:null,fin:null};render()}

// ── HUMEURS HORAIRES (emojis) ────────────────────────────────────
function addMoment(){
  if(newMomentEmoji===null){alert('Choisis un emoji.');return}
  var now=new Date()
  var em=EMOJIS[newMomentEmoji]
  moments.push({heure:toTimeInput(now),emoji:em.e,val:em.v})
  moments.sort(function(a,b){return a.heure.localeCompare(b.heure)})
  newMomentEmoji=null;render()
}
function addMomentAt(heure){
  if(newMomentEmoji===null){alert('Choisis un emoji.');return}
  var em=EMOJIS[newMomentEmoji]
  moments.push({heure:heure,emoji:em.e,val:em.v})
  moments.sort(function(a,b){return a.heure.localeCompare(b.heure)})
  newMomentEmoji=null;render()
}
function removeMoment(i){moments.splice(i,1);render()}
function momentsAverage(){
  if(!moments.length)return null
  var sum=moments.reduce(function(a,m){return a+m.val},0)
  return Math.round(sum/moments.length)
}
function momentsExtreme(){
  // retourne le pic le plus eloigné de 0 (pour alerte medecin)
  if(!moments.length)return null
  var ext=moments[0]
  moments.forEach(function(m){if(Math.abs(m.val)>Math.abs(ext.val))ext=m})
  return ext
}

// ── CALENDAR ─────────────────────────────────────────────────────
function loadChart(){
  var now=new Date(),from=new Date(now)
  from.setDate(from.getDate()-7)
  var p=new URLSearchParams({timeMin:from.toISOString(),timeMax:now.toISOString(),q:'Humeur',singleEvents:'true',orderBy:'startTime',maxResults:'20'})
  fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL_ID)+'/events?'+p,
    {headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.json()})
  .then(function(d){
    if(!d.items){chartData=[];render();return}
    // Dédupliquer : garder l'événement avec la description la plus longue par date
    var evByDate={}
    d.items.forEach(function(ev){
      var dt=new Date(ev.start.date||ev.start.dateTime)
      var key=String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')
      var desc=(ev.description||'')
      if(!evByDate[key]||desc.length>(evByDate[key].description||'').length) evByDate[key]=ev
    })
    chartData=Object.values(evByDate).sort(function(a,b){
      return new Date(a.start.date||a.start.dateTime)-new Date(b.start.date||b.start.dateTime)
    }).map(function(ev){
      var desc=ev.description||''
      var sm=desc.match(/HSCM(?:\s+Score)?\s*:\s*([+-]?\d)/),slm=desc.match(/Total(?:\s+dormi)?\s*:\s*(~?[\dh]+)/),wm=desc.match(/Poids\s*:\s*([\d.]+)/)
      var fp=desc.match(/Fatigue physique\s*:\s*(\d)/),fm=desc.match(/Fatigue mentale\s*:\s*(\d)/),fe=desc.match(/Fatigue emotionnelle\s*:\s*(\d)/)
      var em=desc.match(/Eau\s*:\s*(\d+)/),km=desc.match(/Calories\s*:\s*(\d+)/)
      // sommeil en heures décimales pour graphique
      var slh=null
      if(slm){var hm=slm[1].match(/(\d+)h(\d*)/);if(hm)slh=Math.round((parseInt(hm[1])+(hm[2]?parseInt(hm[2])/60:0))*10)/10}
      var dt=new Date(ev.start&&ev.start.date?ev.start.date:(ev.start.dateTime||'').split('T')[0])
      return{date:String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0'),score:sm?parseInt(sm[1]):0,sleep:slm?slm[1]:null,sleepH:slh,weight:wm?parseFloat(wm[1]):null,fp:fp?parseInt(fp[1]):null,fm:fm?parseInt(fm[1]):null,fe:fe?parseInt(fe[1]):null,eau:em?parseInt(em[1]):null,kcal:km?parseInt(km[1]):null,id:ev.id}
    })
    render()
  }).catch(function(){chartData=[];render()})
}

function loadEventForEdit(dateStr){
  // dateStr = 'YYYY-MM-DD'
  var from=new Date(dateStr+'T00:00:00')
  var to=new Date(dateStr+'T23:59:59')
  var p=new URLSearchParams({timeMin:from.toISOString(),timeMax:to.toISOString(),q:'Humeur',singleEvents:'true',maxResults:'5'})
  return fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL_ID)+'/events?'+p,
    {headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.json()})
  .then(function(d){
    if(!d.items||!d.items.length)return null
    return d.items.find(function(e){return e.summary&&e.summary.includes('Humeur')})||null
  })
}

async function saveCalendar(sum){
  var today=editDate||new Date().toISOString().split('T')[0]
  var sign=score>0?'+'+score:String(score)
  var lines=['Humeur HSCM : '+sign+' - '+scoreLabel(score),'Couche : '+sum.bedtime+' | Leve : '+sum.wakeup,'Total : '+(sum.totalSleep||'?')+' ('+sum.cycleCount+' cycles)']
  if(moments.length){lines.push('Moments : '+moments.map(function(m){return m.heure+' '+m.emoji+'('+(m.val>0?'+':'')+m.val+')'}).join(' | '))}
  var sd=siesteDuree()
  if(sd)lines.push('Sieste : '+toTimeInput(sieste.debut)+'-'+toTimeInput(sieste.fin)+' ('+sd+')')
  else lines.push('Sieste : Aucune')
  if(fatigue.phys!==null)lines.push('Fatigue physique : '+fatigue.phys+'/5')
  if(fatigue.ment!==null)lines.push('Fatigue mentale : '+fatigue.ment+'/5')
  if(fatigue.emot!==null)lines.push('Fatigue emotionnelle : '+fatigue.emot+'/5')
  if(fatigue.impact)lines.push('Impact fatigue : '+fatigue.impact)
  if(repas.matin)lines.push('Petit-dej : '+repas.matin)
  if(repas.midi)lines.push('Dejeuner : '+repas.midi)
  if(repas.soir)lines.push('Diner : '+repas.soir)
  if(repas.collation)lines.push('Collation : '+repas.collation)
  if(calories)lines.push('Calories : '+calories+' kcal')
  if(macros)lines.push('Macros : '+macros)
  lines.push('Eau : '+eau+'/'+EAU_OBJ+' verres')
  lines.push('Medication : '+(med===true?'Prise':med===false?'Omise':'?'))
  if(medSOS)lines.push('SOS : '+medSOS)
  if(weight)lines.push('Poids : '+weight+' kg')
  lines.push('Commentaire : '+comment)
  lines.push('Analyse : '+analysis.justification)
  var desc=lines.join('\n')
  var body={summary:'Humeur '+sign+' - '+scoreLabel(score),description:desc,start:{date:today},end:{date:today},colorId:calColor(score),visibility:'private',transparency:'transparent'}

  var url,method
  if(editMode&&editEventId){
    url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL_ID)+'/events/'+editEventId
    method='PUT'
  } else {
    url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL_ID)+'/events'
    method='POST'
  }
  var r=await fetch(url,{method:method,headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)})
  if(!r.ok)throw new Error('Calendar '+r.status)
}

// ── MINI-GRAPHIQUE SVG GENERIQUE (pour le mail) ──────────────────
function miniBarSVG(data,key,opts){
  opts=opts||{}
  var vals=data.map(function(d){return d[key]}).filter(function(v){return v!==null&&v!==undefined})
  if(!vals.length)return''
  var max=opts.max||Math.max.apply(null,vals)||1
  var W=460,H=110,n=data.length,bW=Math.floor((W-30)/n)-6,sX=15,baseY=H-22,scl=(H-40)/max
  var color=opts.color||'#a78bfa'
  var bars=data.map(function(d,i){
    var v=d[key]
    if(v===null||v===undefined)return'<text x="'+(sX+i*(bW+6)+bW/2)+'" y="'+(H-3)+'" text-anchor="middle" font-size="8" fill="#555">'+d.date+'</text>'
    var bH=Math.max(v*scl,2),x=sX+i*(bW+6),y=baseY-bH
    return '<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="'+bH+'" fill="'+color+'" rx="3"/>'
      +'<text x="'+(x+bW/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="9" font-weight="bold" fill="'+color+'">'+(opts.unit?v+opts.unit:v)+'</text>'
      +'<text x="'+(x+bW/2)+'" y="'+(H-3)+'" text-anchor="middle" font-size="8" fill="#555">'+d.date+'</text>'
  }).join('')
  return '<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;border-radius:8px;background:#0f0f1a;margin-bottom:8px">'
    +'<line x1="0" y1="'+baseY+'" x2="'+W+'" y2="'+baseY+'" stroke="#2d2d4e" stroke-width="1"/>'+bars+'</svg>'
}
// Graphique fatigue 3 dimensions (lignes superposees)
function fatigueLineSVG(data){
  var has=data.some(function(d){return d.fp!==null||d.fm!==null||d.fe!==null})
  if(!has)return''
  var W=460,H=130,n=data.length,sX=20,baseY=H-24,scl=(H-44)/5,gap=(W-40)/(n-1||1)
  function line(key,color){
    var pts=data.map(function(d,i){return d[key]!==null&&d[key]!==undefined?(sX+i*gap)+','+(baseY-d[key]*scl):null}).filter(Boolean).join(' ')
    if(!pts)return''
    return '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5"/>'
      +data.map(function(d,i){return d[key]!==null&&d[key]!==undefined?'<circle cx="'+(sX+i*gap)+'" cy="'+(baseY-d[key]*scl)+'" r="3" fill="'+color+'"/>':''}).join('')
  }
  var labels=data.map(function(d,i){return '<text x="'+(sX+i*gap)+'" y="'+(H-4)+'" text-anchor="middle" font-size="8" fill="#555">'+d.date+'</text>'}).join('')
  return '<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;border-radius:8px;background:#0f0f1a;margin-bottom:8px">'
    +'<line x1="0" y1="'+baseY+'" x2="'+W+'" y2="'+baseY+'" stroke="#2d2d4e" stroke-width="1"/>'
    +line('fp','#f87171')+line('fm','#c084fc')+line('fe','#60a5fa')+labels
    +'<text x="'+sX+'" y="12" font-size="9" fill="#f87171">● Physique</text>'
    +'<text x="'+(sX+90)+'" y="12" font-size="9" fill="#c084fc">● Mentale</text>'

function doAnalyze(){
  var ta=document.getElementById('ta')
  if(ta)comment=ta.value
  if(!comment.trim()&&!moments.length){alert('Ajoute au moins un moment d\'humeur ou un commentaire.');return}
  if(med===null){alert('Indique ta medication.');return}
  step='analyzing';render()
  var sum=getSleep()
  var avg=momentsAverage()
  setTimeout(function(){
    try{
      analysis=analyzeLocal(comment,sum.totalMins,med,medSOS,avg,moments)
      score=analysis.score;step='result';render()
    }catch(e){alert('Erreur: '+e.message);step='form';render()}
  },600)
}

async function startEdit(daysAgo){
  step='saving';saveStatus='Chargement de l\'entree…';render()
  var d=new Date()
  d.setDate(d.getDate()-daysAgo)
  var dateStr=d.toISOString().split('T')[0]
  editDate=dateStr
  try{
    var ev=await loadEventForEdit(dateStr)
    if(!ev){alert('Aucune entree HSCM trouvee pour ce jour.');step='form';render();return}
    editEventId=ev.id
    editMode=true
    // Pre-remplir depuis la description
    var desc=ev.description||''
    var cm=desc.match(/Commentaire\s*:\s*(.+)/s)
    if(cm)comment=cm[1].trim().split('\n')[0]
    var wm=desc.match(/Poids\s*:\s*([\d.]+)/)
    if(wm)weight=wm[1]
    var mm=desc.match(/Medication\s*:\s*(\w+)/)
    if(mm){med=mm[1]==='Prise'?true:mm[1]==='Omise'?false:null}
    step='form';render()
  }catch(e){alert('Erreur chargement: '+e.message);step='form';editMode=false;render()}
}

function doVoice(){doVoiceTo('comment','ta')}
// Dictée vocale universelle : target = nom variable ou 'repas.matin', dom = id textarea
var voiceTarget=null
function doVoiceTo(target,domId){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition
  if(!SR){alert('Dictee non disponible. Utilise le clavier.');return}
  var r=new SR();r.lang='fr-FR';r.continuous=false;r.interimResults=false
  voiceTarget=target
  r.onstart=function(){listening=target;render()}
  r.onresult=function(e){
    var t=e.results[0][0].transcript
    if(target==='comment'){comment=comment+(comment?' ':'')+t}
    else if(target.indexOf('repas.')===0){var k=target.split('.')[1];repas[k]=repas[k]+(repas[k]?' ':'')+t}
    else if(target==='fatigue.impact'){fatigue.impact=fatigue.impact+(fatigue.impact?' ':'')+t}
    listening=false;render()
  }
  r.onend=function(){listening=false;render()}
  r.onerror=function(){listening=false;render()}
  r.start()
}

function buildChart(){
  if(!chartData.length)return''
  var data=chartData.slice(-7)
  var n=data.length,W=440,H=120
  var bW=Math.floor((W-40)/n)-6,sX=20,midY=60,scl=11
  var bars=data.map(function(d,i){
    var x=sX+i*(bW+6),bH=Math.abs(d.score)*scl,y=d.score>=0?midY-bH:midY
    var c=scoreColor(d.score),s=d.score>0?'+'+d.score:String(d.score)
    return '<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="'+Math.max(bH,2)+'" fill="'+c+'" rx="3"/>'
      +'<text x="'+(x+bW/2)+'" y="'+(d.score>=0?y-3:y+bH+11)+'" text-anchor="middle" font-size="9" font-weight="bold" fill="'+c+'">'+s+'</text>'
      +'<text x="'+(x+bW/2)+'" y="'+(H-2)+'" text-anchor="middle" font-size="8" fill="#555">'+d.date+'</text>'
  }).join('')
  return '<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;border-radius:8px;background:#0f0f1a">'
    +'<line x1="0" y1="'+midY+'" x2="'+W+'" y2="'+midY+'" stroke="#2d2d4e" stroke-width="1"/>'+bars+'</svg>'
}

// ── SAUVEGARDE AUTO SUR L'IPAD ───────────────────────────────────
var SAVE_KEY='hscm_jour_en_cours'
function saveLocal(){
  try{
    var c=cycles.map(function(x){return{bed:x.bed?x.bed.toISOString():null,sleep:x.sleep?x.sleep.toISOString():null,wake:x.wake?x.wake.toISOString():null}})
    var s={debut:sieste.debut?sieste.debut.toISOString():null,fin:sieste.fin?sieste.fin.toISOString():null}
    var data={
      date:new Date().toISOString().split('T')[0],
      cycles:c,sieste:s,fatigue:fatigue,repas:repas,calories:calories,macros:macros,
      eau:eau,moments:moments,med:med,medSOS:medSOS,comment:comment,weight:weight
    }
    localStorage.setItem(SAVE_KEY,JSON.stringify(data))
  }catch(e){}
}
function loadLocal(){
  try{
    var raw=localStorage.getItem(SAVE_KEY)
    if(!raw)return false
    var data=JSON.parse(raw)
    // Ne recharge que si c'est la meme journee (sinon nouvelle journee = repart a zero)
    var today=new Date().toISOString().split('T')[0]
    if(data.date!==today)return false
    if(data.cycles)cycles=data.cycles.map(function(x){return{bed:x.bed?new Date(x.bed):null,sleep:x.sleep?new Date(x.sleep):null,wake:x.wake?new Date(x.wake):null}})
    if(data.sieste)sieste={debut:data.sieste.debut?new Date(data.sieste.debut):null,fin:data.sieste.fin?new Date(data.sieste.fin):null}
    if(data.fatigue)fatigue=data.fatigue
    if(data.repas)repas=data.repas
    if(data.calories!==undefined)calories=data.calories
    if(data.macros!==undefined)macros=data.macros
    if(data.eau!==undefined)eau=data.eau
    if(data.moments)moments=data.moments
    if(data.med!==undefined)med=data.med
    if(data.medSOS!==undefined)medSOS=data.medSOS
    if(data.comment!==undefined)comment=data.comment
    if(data.weight!==undefined)weight=data.weight
    return true
  }catch(e){return false}
}
function clearLocal(){try{localStorage.removeItem(SAVE_KEY)}catch(e){}}

// ── COPIER LA JOURNEE (pour coller dans Notes) ───────────────────
function copierJournee(){
  var sum=getSleep()
  var d=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
  var L=['JOURNAL HSCM — '+d,'']
  if(moments.length){L.push('HUMEUR AU FIL DE LA JOURNEE :');moments.forEach(function(m){L.push('  '+m.heure+' '+m.emoji+' ('+(m.val>0?'+':'')+m.val+')')});var avg=momentsAverage();L.push('  → Moyenne : '+(avg>0?'+':'')+avg+' ('+scoreLabel(avg)+')');L.push('')}
  L.push('SOMMEIL :')
  L.push('  Couche : '+sum.bedtime+' | Leve : '+sum.wakeup)
  L.push('  Total : '+(sum.totalSleep||'?')+' ('+sum.cycleCount+' cycle'+(sum.cycleCount>1?'s':'')+')')
  var sd=siesteDuree()
  L.push('  Sieste : '+(sd?toTimeInput(sieste.debut)+'-'+toTimeInput(sieste.fin)+' ('+sd+')':'Aucune'))
  L.push('')
  if(fatigue.phys!==null||fatigue.ment!==null||fatigue.emot!==null){
    L.push('FATIGUE :')
    if(fatigue.phys!==null)L.push('  Physique : '+fatigue.phys+'/5 ('+FATLBL.phys[fatigue.phys]+')')
    if(fatigue.ment!==null)L.push('  Mentale : '+fatigue.ment+'/5 ('+FATLBL.ment[fatigue.ment]+')')
    if(fatigue.emot!==null)L.push('  Emotionnelle : '+fatigue.emot+'/5 ('+FATLBL.emot[fatigue.emot]+')')
    if(fatigue.impact)L.push('  Impact : '+fatigue.impact)
    L.push('')
  }
  if(repas.matin||repas.midi||repas.soir||repas.collation){
    L.push('ALIMENTATION :')
    if(repas.matin)L.push('  Petit-dej : '+repas.matin)
    if(repas.midi)L.push('  Dejeuner : '+repas.midi)
    if(repas.soir)L.push('  Diner : '+repas.soir)
    if(repas.collation)L.push('  Collation : '+repas.collation)
    if(calories)L.push('  Calories : '+calories+' kcal'+(macros?' ('+macros+')':''))
    L.push('')
  }
  L.push('Hydratation : '+eau+'/'+EAU_OBJ+' verres')
  L.push('Medication : '+(med===true?'Prise':med===false?'Omise':'?')+(medSOS?' | SOS: '+medSOS:''))
  if(weight)L.push('Poids : '+weight+' kg')
  if(comment)L.push('','COMMENTAIRE :','  '+comment)
  var txt=L.join('\n')
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){alert('✅ Journee copiee ! Ouvre Notes et colle (appui long → Coller).')}).catch(function(){promptCopy(txt)})
  }else{promptCopy(txt)}
}
function promptCopy(txt){
  // Fallback : selection manuelle
  var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select()
  try{document.execCommand('copy');alert('✅ Journee copiee ! Colle-la dans Notes.')}catch(e){alert('Copie manuelle :\n\n'+txt)}
  document.body.removeChild(ta)
}

window.addEventListener('DOMContentLoaded',function(){loadLocal();render()})
</script>
